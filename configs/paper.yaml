# 模拟盘（paper）运行配置。
# 运行模式（trading_mode / kill_switch）与密钥来自 .env（Settings 权威，见 .env.example）；
# 本文件只承载**非密钥**运行参数：策略、日志、以及安全关键的风控限额。

strategy: strategies/mvp.yaml   # 相对本文件目录解析

logging:
  level: INFO
  format: json

# 预交易风控限额（安全关键，纳入版本控制）。金额单位为名义美元；
# daily_loss_limit 为占日初权益的比例（0.03 = 3%）。
risk:
  max_position_per_name: 25000
  max_gross_exposure: 100000
  max_notional_per_order: 20000
  max_orders_per_interval: 10
  daily_loss_limit: 0.03
